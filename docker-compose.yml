version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ucar
      POSTGRES_PASSWORD: ucar_pass
      POSTGRES_DB: ucar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ucar -d ucar_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ucar:ucar_pass@db:5432/ucar_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - reports_data:/app/reports
      - uploads_data:/app/uploads

  celery_worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ucar:ucar_pass@db:5432/ucar_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - reports_data:/app/reports

  celery_beat:
    build: ./backend
    command: celery -A app.worker beat --loglevel=info
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ucar:ucar_pass@db:5432/ucar_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - celery_worker

volumes:
  postgres_data:
  reports_data:
  uploads_data:
