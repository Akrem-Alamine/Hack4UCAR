events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    client_max_body_size 50M;

    # Docker embedded DNS — resolve service names at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    server {
        listen 80;
        server_name _;

        # Security headers applied to all responses
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API → FastAPI backend (forward full URI including /api/)
        location /api/ {
            set $backend http://backend:8000;
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
        }

        # FastAPI docs — only proxied when DEBUG=true in backend config (FastAPI returns 404 otherwise)
        location ~ ^/(docs|redoc|openapi\.json|health) {
            set $backend http://backend:8000;
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Everything else → Next.js frontend
        location / {
            set $frontend http://frontend:3000;
            proxy_pass         $frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
